<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>LIVE SCORE — GDG Cloud Surabaya</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════
   ROOT
═══════════════════════════════════════════════ */
:root {
  --bg:       #020714;
  --glass:    rgba(6, 18, 52, 0.68);
  --glass-l:  rgba(28, 18, 2, 0.78);
  --cyan:     #00f0ff;
  --cyan-g:   rgba(0,240,255,0.4);
  --cyan-gg:  rgba(0,240,255,0.12);
  --violet:   #a020f0;
  --violet-g: rgba(160,32,240,0.4);
  --gold:     #ffd700;
  --gold-g:   rgba(255,215,0,0.5);
  --gold-gg:  rgba(255,215,0,0.12);
  --silver:   #c8d4e8;
  --bronze:   #cd9060;
  --text:     #dff0ff;
  --tM:       rgba(180,220,255,0.55);
  --tD:       rgba(120,180,255,0.28);
  --border:   rgba(0,240,255,0.2);
  --F1:       'Orbitron',monospace;
  --F2:       'Exo 2',sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  font-family: var(--F2);
  background: var(--bg);
  color: var(--text);
  display: flex; flex-direction: column;
}

/* Animated grid */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(0,240,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,240,255,0.025) 1px, transparent 1px);
  background-size: 58px 58px;
  animation: gMove 22s linear infinite;
  pointer-events: none;
}
@keyframes gMove { to { background-position: 58px 58px, 58px 58px; } }

/* Deep color orbs */
.bg-orbs {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 65% 55% at 12% 12%, rgba(0,50,180,0.3) 0%, transparent 65%),
    radial-gradient(ellipse 55% 50% at 88% 88%, rgba(110,0,210,0.22) 0%, transparent 65%),
    radial-gradient(ellipse 50% 40% at 50% 105%, rgba(0,60,160,0.2) 0%, transparent 60%);
}

/* CRT scanlines */
.scanlines {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent, transparent 2px,
    rgba(0,0,0,0.055) 2px, rgba(0,0,0,0.055) 4px
  );
}

/* ═══════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════ */
header {
  position: relative; z-index: 10; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 44px; height: 74px;
  background: rgba(2,7,24,0.9);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 0 36px rgba(0,240,255,0.06), inset 0 -1px 0 rgba(0,240,255,0.1);
  overflow: hidden;
}
header::after {
  content: '';
  position: absolute; bottom: 0; left: -60%; width: 60%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--cyan), var(--violet), transparent);
  animation: hScan 3.4s ease-in-out infinite;
}
@keyframes hScan { 0%{left:-60%;opacity:0} 15%{opacity:1} 85%{opacity:1} 100%{left:100%;opacity:0} }

.h-left { display: flex; align-items: center; gap: 16px; }

.logo {
  width: 48px; height: 48px;
  position: relative; display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.logo::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--cyan), var(--violet));
  clip-path: polygon(50% 0%,95% 25%,95% 75%,50% 100%,5% 75%,5% 25%);
  filter: drop-shadow(0 0 15px var(--cyan-g));
}
.logo span { position: relative; z-index: 1; }

/* Live dot indicator */
.live-pill {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--F1); font-size: 9px;
  letter-spacing: .2em; text-transform: uppercase; color: var(--cyan);
  border: 1px solid rgba(0,240,255,0.3);
  background: rgba(0,240,255,0.05);
  padding: 4px 14px 4px 10px; border-radius: 4px;
}
.live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--cyan); box-shadow: 0 0 8px var(--cyan);
  animation: blinkDot 1.2s ease-in-out infinite;
}
@keyframes blinkDot {
  0%,100% { opacity:1; box-shadow: 0 0 8px var(--cyan), 0 0 18px var(--cyan-g); }
  50%     { opacity:.3; box-shadow: none; }
}

.h-right { text-align: right; }
.h-title {
  font-family: var(--F1); font-size: 20px; font-weight: 700; letter-spacing: .07em;
  background: linear-gradient(90deg, var(--cyan), #88ccff, var(--violet));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; line-height: 1.15;
}
.h-sub {
  font-family: var(--F2); font-size: 11px;
  color: var(--tM); letter-spacing: .14em; text-transform: uppercase; font-weight: 500;
}

/* ═══════════════════════════════════════════════
   PODIUM STAGE
═══════════════════════════════════════════════ */
.stage {
  flex: 1; position: relative; z-index: 2;
  display: flex; align-items: center; justify-content: center;
  padding: 24px 32px 16px;
  overflow: hidden;
}

/* ─ PODIUM WRAPPER: flex with fixed order slots ─
   Visual order: [Rank2=left] [Rank1=center] [Rank3=right]
   We use a 3-column grid with explicit column assignments,
   and animate each card via transforms when ranks change. */
.podium {
  display: flex;
  align-items: flex-end;          /* bottom-align for podium height illusion */
  justify-content: center;
  gap: 24px;
  width: 100%; max-width: 1100px;
}

/* ─ PODIUM COLUMN ─ */
.p-col {
  display: flex; flex-direction: column; align-items: center;
  transition: transform .7s cubic-bezier(.22,.68,0,1.15),
              opacity .5s ease;
}

/* Column size variants */
.p-col.sz-1 { flex: 0 0 380px; }   /* Rank 1 – largest */
.p-col.sz-2 { flex: 0 0 310px; }   /* Rank 2 */
.p-col.sz-3 { flex: 0 0 272px; }   /* Rank 3 */

/* ─ SCORE CARD ─ */
.p-card {
  width: 100%;
  background: var(--glass);
  border: 1px solid rgba(0,240,255,0.18);
  border-radius: 22px;
  padding: 32px 28px 28px;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  position: relative; overflow: hidden;
  transition: border-color .5s, box-shadow .5s;
}

/* Top glow bar */
.p-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  opacity: .4;
}
/* Corner ambient */
.p-card::after {
  content: ''; position: absolute; bottom: 0; right: 0;
  width: 90px; height: 90px;
  background: radial-gradient(circle at bottom right, var(--cyan-gg), transparent 70%);
  pointer-events: none;
}

/* ─ RANK 1 CARD ─ */
.p-card.r1 {
  border-color: rgba(255,215,0,.55);
  background: var(--glass-l);
  box-shadow:
    0 0 60px rgba(255,215,0,.18),
    0 0 120px rgba(255,215,0,.07),
    inset 0 0 60px rgba(255,215,0,.04);
}
.p-card.r1::before {
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 1; animation: r1bar 1.8s ease-in-out infinite;
}
.p-card.r1::after {
  background: radial-gradient(circle at bottom right, var(--gold-gg), transparent 70%);
}
@keyframes r1bar { 0%,100%{opacity:.5} 50%{opacity:1} }

/* ─ SHINE EFFECT — pseudo-element sweeping left→right ─ */
.p-card.r1 .shine {
  position: absolute; inset: 0; z-index: 5; border-radius: 22px;
  pointer-events: none; overflow: hidden;
}
.p-card.r1 .shine::before {
  content: '';
  position: absolute; top: -50%; left: -80%;
  width: 40%; height: 200%;
  background: linear-gradient(
    105deg,
    transparent 30%,
    rgba(255,255,255,.22) 50%,
    transparent 70%
  );
  animation: shineSweep 3s ease-in-out infinite;
  transform: skewX(-12deg);
}
@keyframes shineSweep {
  0%   { left: -80%; opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { left: 140%; opacity: 0; }
}

/* ─ RANK 2 CARD ─ */
.p-card.r2 {
  box-shadow: 0 0 30px rgba(0,240,255,.1), inset 0 1px 0 rgba(0,240,255,.08);
}

/* ─ RANK 3 CARD ─ */
.p-card.r3 {
  opacity: .88;
  box-shadow: 0 0 20px rgba(0,240,255,.07);
}

/* ─ MEDAL ─ */
.medal {
  font-size: 36px;
  filter: drop-shadow(0 0 12px rgba(255,215,0,.5));
  margin-bottom: 10px;
  transition: transform .3s;
  text-align: center;
}
.sz-2 .medal { font-size: 30px; }
.sz-3 .medal { font-size: 26px; }

/* ─ RANK LABEL ─ */
.rank-lbl {
  font-family: var(--F1); font-size: 9px;
  letter-spacing: .2em; text-transform: uppercase;
  color: var(--tD); margin-bottom: 14px; text-align: center;
}
.r1 .rank-lbl { color: rgba(255,215,0,.65); }

/* ─ TEAM NAME ─ */
.tname {
  font-family: var(--F1);
  font-size: clamp(16px, 2.2vw, 24px);
  font-weight: 700; letter-spacing: .05em;
  text-align: center; line-height: 1.2;
  color: var(--text);
  margin-bottom: 18px;
  transition: color .4s, text-shadow .4s;
  word-break: break-word;
}
.r1 .tname {
  color: var(--gold);
  text-shadow: 0 0 24px var(--gold-g), 0 0 50px rgba(255,215,0,.12);
  font-size: clamp(20px, 2.8vw, 30px);
}

/* ─ SCORE ─ */
.tscore {
  font-family: var(--F1);
  font-size: clamp(60px, 9vw, 110px);
  font-weight: 900; line-height: 1;
  letter-spacing: -.05em; text-align: center;
  color: var(--cyan);
  text-shadow: 0 0 22px var(--cyan-g), 0 0 50px rgba(0,240,255,.12);
  transition: color .4s, text-shadow .4s;
}
.r1 .tscore {
  color: var(--gold);
  text-shadow: 0 0 28px var(--gold-g), 0 0 60px rgba(255,215,0,.15);
  font-size: clamp(72px, 11vw, 130px);
}
.sz-3 .tscore { font-size: clamp(50px, 7vw, 90px); }

/* Score pop animation */
@keyframes sPop {
  0%   { transform: scale(1); }
  25%  { transform: scale(1.4); filter: brightness(2.4); }
  55%  { transform: scale(.94); }
  78%  { transform: scale(1.06); }
  100% { transform: scale(1); filter: brightness(1); }
}
.tscore.pop { animation: sPop .48s cubic-bezier(.34,1.56,.64,1); }

/* ─ PODIUM BASE ─ */
.p-base {
  width: 100%;
  border-radius: 0 0 12px 12px;
  margin-top: 0;
  transition: height .6s ease, background .4s;
}
.p-col.sz-1 .p-base { height: 48px; background: linear-gradient(180deg, rgba(255,215,0,.2), rgba(255,215,0,.05)); border: 1px solid rgba(255,215,0,.25); border-top: none; }
.p-col.sz-2 .p-base { height: 32px; background: linear-gradient(180deg, rgba(0,240,255,.12), rgba(0,240,255,.03)); border: 1px solid rgba(0,240,255,.15); border-top: none; }
.p-col.sz-3 .p-base { height: 18px; background: linear-gradient(180deg, rgba(0,240,255,.07), rgba(0,240,255,.02)); border: 1px solid rgba(0,240,255,.1); border-top: none; }

/* Rank change slide animations */
@keyframes rankUpSlide {
  0%   { opacity: 0; transform: translateY(40px) scale(.92); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes rankDownSlide {
  0%   { opacity: .5; transform: translateY(-28px); }
  100% { opacity: 1; transform: translateY(0); }
}
.rank-anim-up   { animation: rankUpSlide   .6s cubic-bezier(.22,.68,0,1.2); }
.rank-anim-down { animation: rankDownSlide .5s ease; }

/* ═══════════════════════════════════════════════
   TICKER
═══════════════════════════════════════════════ */
.ticker {
  position: relative; z-index: 10; flex-shrink: 0;
  height: 38px;
  background: rgba(0,0,0,.5);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; overflow: hidden;
}
.t-label {
  font-family: var(--F1); font-size: 9px;
  letter-spacing: .18em; text-transform: uppercase; color: var(--cyan);
  padding: 0 20px; height: 100%; display: flex; align-items: center; gap: 8px;
  border-right: 1px solid var(--border); background: rgba(0,240,255,.04);
  white-space: nowrap; flex-shrink: 0;
}
.t-scroll { flex: 1; overflow: hidden; height: 100%; display: flex; align-items: center; }
.t-txt {
  font-family: var(--F2); font-size: 12px; font-weight: 600;
  color: var(--tM); letter-spacing: .06em; white-space: nowrap;
  animation: tickMove 20s linear infinite; padding-left: 60px;
}
@keyframes tickMove { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

/* ═══════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════ */
@media (max-width: 800px) {
  header { padding: 0 16px; }
  .h-title { font-size: 15px; }
  .podium { gap: 14px; }
  .p-col.sz-1 { flex: 0 0 240px; }
  .p-col.sz-2 { flex: 0 0 190px; }
  .p-col.sz-3 { flex: 0 0 165px; }
  .tscore { font-size: clamp(44px,8vw,80px)!important; }
  .tname  { font-size: clamp(12px,2vw,18px)!important; }
}
@media (max-width: 540px) {
  .podium { flex-direction: column; align-items: center; gap: 16px; }
  .p-col.sz-1,.p-col.sz-2,.p-col.sz-3 { flex: 0 0 auto; width: 90vw; }
}
</style>
</head>
<body>
<div class="bg-orbs"></div>
<div class="scanlines"></div>

<!-- ═══ HEADER ═══ -->
<header>
  <div class="h-left">
    <div class="logo"><span>⚡</span></div>
    <div class="live-pill"><div class="live-dot"></div>Live Now</div>
  </div>
  <div class="h-right">
    <div class="h-title">Live Score Competition</div>
    <div class="h-sub">GDG Cloud Surabaya</div>
  </div>
</header>

<!-- ═══ PODIUM STAGE ═══ -->
<div class="stage">
  <div class="podium" id="podium"></div>
</div>

<!-- ═══ TICKER ═══ -->
<div class="ticker">
  <div class="t-label"><div class="live-dot" style="width:6px;height:6px"></div>Live Standings</div>
  <div class="t-scroll"><div class="t-txt" id="tickerTxt"></div></div>
</div>

<script>
/* ═══════════════════════════════════════════════
   DATA + SYNC
═══════════════════════════════════════════════ */
const SKEY = 'gdg_ls_v3';

let teams = (() => {
  try { const d = localStorage.getItem(SKEY); return d ? JSON.parse(d) : null; } catch { return null; }
})() || [
  { name: 'Team Alpha', score: 0 },
  { name: 'Team Beta',  score: 0 },
  { name: 'Team Gamma', score: 0 }
];

/* Track previous ranks for change detection */
let prevRanks = [1, 2, 3]; // indexed by team index

/* ═══════════════════════════════════════════════
   WEB AUDIO (display side — same system)
═══════════════════════════════════════════════ */
const AC = new (window.AudioContext || window.webkitAudioContext)();
function tone(f, t, v, d, s = 0) {
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = t;
  o.frequency.setValueAtTime(f, AC.currentTime + s);
  g.gain.setValueAtTime(0, AC.currentTime + s);
  g.gain.linearRampToValueAtTime(v, AC.currentTime + s + 0.015);
  g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + s + d);
  o.start(AC.currentTime + s);
  o.stop(AC.currentTime + s + d + 0.05);
}

function playSound(type) {
  try {
    if (type === 'up')    { tone(660,'square',.12,.07); tone(1000,'sine',.18,.12,.07); tone(1320,'sine',.1,.1,.15); }
    if (type === 'down')  { tone(440,'sawtooth',.12,.09); tone(320,'sawtooth',.09,.11,.08); }
    if (type === 'reset') { [380,330,280,230,180].forEach((f,i)=>tone(f,'sine',.12,.1,i*.06)); }
    if (type === 'rankup') {
      // Level-up fanfare: ascending arpeggio
      [523,659,784,1047].forEach((f,i) => tone(f,'sine',.2,.15,i*.1));
      setTimeout(() => { tone(1047,'sine',.18,.08); tone(1319,'sine',.22,.22,.08); }, 450);
    }
  } catch(e) {}
}

/* ═══════════════════════════════════════════════
   RANKING
═══════════════════════════════════════════════ */
function hitungRanking() {
  const sorted = [...teams].map(t => t.score).sort((a, b) => b - a);
  return teams.map(t => sorted.indexOf(t.score) + 1);
}

/* ═══════════════════════════════════════════════
   DETECT RANK CHANGE
═══════════════════════════════════════════════ */
function detectRankChange(newRanks) {
  newRanks.forEach((nr, i) => {
    if (prevRanks[i] !== undefined && nr < prevRanks[i]) {
      // Team i moved to a better rank → play rank-up sound
      playSound('rankup');
    }
  });
}

/* ═══════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════ */
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const MDL  = { 1:'🥇', 2:'🥈', 3:'🥉' };
const RLBL = { 1:'RANK #1 — LEADER', 2:'RANK #2', 3:'RANK #3' };

/* ═══════════════════════════════════════════════
   RENDER DISPLAY
   Visual layout: [Rank2 | Rank1 | Rank3]
═══════════════════════════════════════════════ */
function renderDisplay(changedIdx = -1, dir = 0, rankChanged = false) {
  const ranks = hitungRanking();

  /* Detect and fire rank-change sound */
  detectRankChange(ranks);

  /* Visual podium order: slot0=rank2 team, slot1=rank1 team, slot2=rank3 team */
  const byRank = [null, null, null]; // byRank[visualSlot] = teamIndex
  teams.forEach((_, i) => {
    const r = ranks[i];
    if (r === 1) byRank[1] = i;      // center
    else if (r === 2) byRank[0] = i; // left
    else if (r === 3) byRank[2] = i; // right
  });

  /* Size + rank class per visual slot */
  const slotSz    = ['sz-2', 'sz-1', 'sz-3'];
  const slotRank  = [2, 1, 3];
  const slotRCls  = ['r2', 'r1', 'r3'];

  const podium = document.getElementById('podium');

  /* Build each visual column */
  podium.innerHTML = slotRank.map((visualRank, slot) => {
    const ti = byRank[slot]; // team index for this slot
    if (ti === null || ti === undefined) return '';

    const team  = teams[ti];
    const rank  = ranks[ti];
    const szCls = slotSz[slot];
    const rCls  = slotRCls[slot];
    const isR1  = rank === 1;

    /* Determine animation */
    const wasChanged = ti === changedIdx;
    const prevR = prevRanks[ti];
    const nowR  = rank;
    let aniCls  = '';
    if (prevRanks.length > 0 && prevR !== undefined) {
      if (nowR < prevR) aniCls = 'rank-anim-up';
      else if (nowR > prevR) aniCls = 'rank-anim-down';
    }

    return `
    <div class="p-col ${szCls} ${aniCls}" id="pcol-${ti}">
      <div class="p-card ${rCls}">
        ${isR1 ? '<div class="shine"></div>' : ''}
        <div class="medal">${MDL[rank] || '🏅'}</div>
        <div class="rank-lbl">${RLBL[rank] || `RANK #${rank}`}</div>
        <div class="tname">${esc(team.name)}</div>
        <div class="tscore ${wasChanged ? 'pop' : ''}" id="dsc-${ti}">${team.score}</div>
      </div>
      <div class="p-base"></div>
    </div>`;
  }).join('');

  /* Remove animation classes after completion */
  podium.querySelectorAll('.rank-anim-up,.rank-anim-down').forEach(el => {
    el.addEventListener('animationend', () => {
      el.classList.remove('rank-anim-up','rank-anim-down');
    }, { once: true });
  });
  podium.querySelectorAll('.pop').forEach(el => {
    el.addEventListener('animationend', () => el.classList.remove('pop'), { once: true });
  });

  /* Store ranks for next comparison */
  prevRanks = [...ranks];

  /* Update ticker */
  updateTicker(ranks);
}

/* ═══════════════════════════════════════════════
   TICKER
═══════════════════════════════════════════════ */
function updateTicker(ranks) {
  const order = [0,1,2].sort((a,b) => ranks[a] - ranks[b]);
  const txt = order.map(i => `${MDL[ranks[i]]||'🏅'} ${teams[i].name}: ${teams[i].score} pts`).join('   ·   ');
  const el = document.getElementById('tickerTxt');
  el.textContent = txt + '      ·      ' + txt;
}

/* ═══════════════════════════════════════════════
   STORAGE LISTENER
═══════════════════════════════════════════════ */
window.addEventListener('storage', e => {
  if (e.key !== SKEY || !e.newValue) return;
  const nw = JSON.parse(e.newValue);

  let cIdx = -1, dir = 0;
  nw.forEach((nt, i) => {
    if (nt.score !== teams[i].score) {
      cIdx = i;
      dir = nt.score > teams[i].score ? 1 : -1;
    }
  });

  // Play score sound on display page too
  if (cIdx >= 0) playSound(dir > 0 ? 'up' : 'down');

  teams = nw;
  renderDisplay(cIdx, dir);
});
